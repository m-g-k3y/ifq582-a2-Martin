<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <!-- CSS page standardised colours -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">

        <title>{% block title %}Ngurra Digital Library{% endblock %}</title>

        {% block head %}{% endblock %}
    </head>
    <body>
        <nav class="navbar navbar-expand-sm navbar-custom navbar-dark">
            <!-- Navbar content -->
            <a class="navbar-brand" href="{{ url_for('main.index') }}">Ngurra Digital Library</a>

            <!-- Toggler/collapsibe Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar links -->
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-custom" id="login-btn">Login</button>
                    </li>
                </ul>
            </div>
        </nav>

        {% block hero %}{% endblock %}

        <main class="container my-4">
            {% block content %}
            {% endblock %}
        </main>
        {% block footer %}
            <footer class="text-center py-4">
                <p>site name · acknowledgement line · year</p>
            </footer>
        {% endblock %}   
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        {% block scripts %}{% endblock %}
    </body>
 
</html>
